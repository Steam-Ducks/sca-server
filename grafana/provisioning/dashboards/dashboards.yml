apiVersion: 1

providers:
  - name: K6
    folder: K6
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards/json/k6

  - name: sca
    folder: SCA Overview
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards/json/sca

