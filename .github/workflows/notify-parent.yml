name: Notify Parent Repo

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger parent repo submodule update
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Steam-Ducks/strategic-cost-analytics/dispatches \
            -d '{"event_type": "submodule-update", "client_payload": {"submodule": "sca-server"}}'
