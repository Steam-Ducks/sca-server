name: post-deploy-smoke

on:
  workflow_run:
    workflows: ['automatic-deploy']
    types:
      - completed

jobs:
  smoke-backend:
    name: Backend (k6)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Run smoke on VPS (with Prometheus output)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /home/deploy/app/sca-server
            k6 run \
              --out experimental-prometheus-rw=http://localhost:9090/api/v1/write \
              --env K6_BASE_URL=${{ secrets.PROD_API_URL }} \
              --env K6_AUTH_USERNAME=${{ secrets.K6_AUTH_USERNAME }} \
              --env K6_AUTH_PASSWORD=${{ secrets.K6_AUTH_PASSWORD }} \
              --tag scenario=smoke \
              k6/scenarios/smoke.js
