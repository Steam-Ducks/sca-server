name: post-deploy-smoke

on:
  workflow_run:
    workflows: ['automatic-deploy']
    types:
      - completed
  schedule:
  workflow_dispatch:

jobs:
  smoke-backend:
    name: Backend (k6)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6

      - name: Run smoke test
        env:
          K6_BASE_URL: ${{ secrets.PROD_API_URL }}
          K6_AUTH_USERNAME: ${{ secrets.K6_AUTH_USERNAME }}
          K6_AUTH_PASSWORD: ${{ secrets.K6_AUTH_PASSWORD }}
        run: k6 run k6/scenarios/smoke.js

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-results
          path: k6-summary.json
          if-no-files-found: ignore
