name: post-deploy-smoke

# Roda DEPOIS do automatic-deploy concluir, não em paralelo com ele.
# Disparar direto no push testava a versão antiga, pois o build+deploy
# na VPS ainda não havia terminado.
on:
  workflow_run:
    workflows: ["automatic-deploy"]
    types:
      - completed
  workflow_dispatch:

jobs:
  smoke-backend:
    name: Backend (k6)
    runs-on: ubuntu-latest
    # Só roda se o deploy passou (ou em disparo manual).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Run smoke on VPS (with Prometheus output)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /home/deploy/app/sca-server
            K6_PROMETHEUS_RW_SERVER_URL=http://localhost:9090/api/v1/write \
            K6_PROMETHEUS_RW_TREND_STATS="p(50),p(95),p(99),max" \
            k6 run \
              --out experimental-prometheus-rw \
              --env K6_BASE_URL=${{ secrets.PROD_API_URL }} \
              --env K6_AUTH_USERNAME=${{ secrets.K6_AUTH_USERNAME }} \
              --env K6_AUTH_PASSWORD=${{ secrets.K6_AUTH_PASSWORD }} \
              --tag scenario=smoke \
              k6/scenarios/smoke.js
