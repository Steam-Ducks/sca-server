name: DB Versioning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ─── 1. Detecção de migrations destrutivas ──────────────────────────────────
  # Roda primeiro e de forma independente. Se encontrar operações CRÍTICAS
  # (DROP TABLE, TRUNCATE, DELETE sem WHERE), bloqueia o pipeline e exige
  # revisão manual antes de continuar.
  destructive-check:
    name: Destructive Migration Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verificar migrations destrutivas no PR
        # --changed-only analisa apenas arquivos alterados vs develop/main
        # Em push direto (develop/main), analisa todas as migrations
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python scripts/check_destructive_migrations.py --changed-only
          else
            python scripts/check_destructive_migrations.py
          fi

      - name: Step Summary
        if: always()
        run: |
          echo "## Destructive Migration Check" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Evento | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY

  # ─── 2. Migration Lint ───────────────────────────────────────────────────────
  migration-lint:
    name: Migration Lint
    runs-on: ubuntu-latest
    needs: destructive-check

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sca_test
          POSTGRES_USER: sca_user
          POSTGRES_PASSWORD: sca_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: sca_test
      DB_USER: sca_user
      DB_PASSWORD: sca_password
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "True"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for missing migrations
        run: |
          python manage.py makemigrations --check --dry-run
          echo "✅ Nenhuma migração pendente"

      - name: Apply all migrations
        run: |
          python manage.py migrate --noinput
          echo "✅ Migrações aplicadas com sucesso"

      - name: Export migration list
        run: python manage.py showmigrations --list > migration_report.txt

      - name: Upload migration report
        uses: actions/upload-artifact@v4
        with:
          name: migration-report
          path: migration_report.txt
          retention-days: 30

  # ─── 3. Schema Snapshot ─────────────────────────────────────────────────────
  # Gera snapshot do schema após cada merge na main para rastrear evolução
  schema-snapshot:
    name: Schema Snapshot
    runs-on: ubuntu-latest
    needs: migration-lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sca_test
          POSTGRES_USER: sca_user
          POSTGRES_PASSWORD: sca_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: sca_test
      DB_USER: sca_user
      DB_PASSWORD: sca_password
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "True"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Export schema snapshot
        run: python scripts/export_schema_snapshot.py

      - name: Upload schema snapshot
        uses: actions/upload-artifact@v4
        with:
          name: schema-snapshot-${{ github.sha }}
          path: schema_snapshot.json
          retention-days: 90
