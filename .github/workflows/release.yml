name: Scheduled Merge to Main

on:
  schedule:
    # 05/04/2026 - 12:00 UTC
    - cron: "0 12 5 4 *"
    # 03/05/2026 - 12:00 UTC
    - cron: "0 12 3 5 *"
    # 31/05/2026 - 12:00 UTC
    - cron: "0 12 31 5 *"
  workflow_dispatch:

jobs:
  check-year:
    name: Verify scheduled year
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.run }}
    steps:
      - name: Check if current year is 2026
        id: check
        run: |
          YEAR=$(date +%Y)
          if [ "$YEAR" = "2026" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    needs: check-year
    if: needs.check-year.outputs.should_run == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ruff==0.6.9 black==24.8.0

      - name: Ruff check
        run: ruff check .

      - name: Black check
        run: black --check .

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: check-year
    if: needs.check-year.outputs.should_run == 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: ci-secret-key
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests with coverage
        run: coverage run -m pytest

      - name: Coverage report
        run: coverage report

      - name: Generate coverage XML
        run: coverage xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  merge-to-main:
    name: Merge develop → main
    runs-on: ubuntu-latest
    needs: [lint, test, sonar]
    if: success()

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge develop into main
        run: |
          git fetch origin develop
          git merge origin/develop --no-edit
          git push origin main
          