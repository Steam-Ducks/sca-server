name: Scheduled Merge to Main

on:
  schedule:
    # 05/04/2026 - 12:00 UTC
    - cron: "0 12 5 4 *"
    # 03/05/2026 - 12:00 UTC
    - cron: "0 12 3 5 *"
    # 31/05/2026 - 12:00 UTC
    - cron: "0 12 31 5 *"
  workflow_dispatch:

jobs:
  check-date:
    name: Verify Scheduled Date
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}

    steps:
      - name: Check if today is a scheduled merge date
        id: check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if [[ "$TODAY" == "2026-04-05" || "$TODAY" == "2026-05-03" || "$TODAY" == "2026-05-31" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  # Lint, unit e integration tests já rodam nos PRs feature → develop (ci.yml).
  # develop → main é o mesmo código, então aqui só geramos o coverage e
  # rodamos o SonarCloud — num único job, como no sca-client.
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: check-date
    if: needs.check-date.outputs.should_run == 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DJANGO_SETTINGS_MODULE: config.settings_test
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: ci-secret-key
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Os modelos silver/gold/audit precisam dos schemas antes das migrations
      - name: Create PostgreSQL schemas
        run: |
          PGPASSWORD=${{ env.DB_PASSWORD }} psql \
            -h ${{ env.DB_HOST }} -U ${{ env.DB_USER }} -d ${{ env.DB_NAME }} \
            -c "CREATE SCHEMA IF NOT EXISTS silver;
                CREATE SCHEMA IF NOT EXISTS gold;
                CREATE SCHEMA IF NOT EXISTS audit;"

      - name: Run migrations
        run: python manage.py migrate

      - name: Generate coverage for Sonar
        run: |
          coverage run -m pytest
          coverage xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  merge-to-main:
    name: Merge develop into main
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: success()

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge develop into main
        run: |
          git fetch origin develop
          git merge origin/develop --no-ff -m "chore: scheduled merge develop into main [$(date -u +%Y-%m-%d)]"
          git push origin main
