name: automatic-deploy

on:
  push:
    branches:
      - main

# Evita dois deploys concorrentes em pushes próximos. Não cancela o que
# já está rodando para não interromper um build/deploy em andamento.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS (with pre-deploy backup and migration safety)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          # Timeout: 10 min (migrations pesadas podem demorar)
          command_timeout: 10m
          script: |
            set -euo pipefail
            APP_DIR=/home/deploy/app/sca-server
            BACKUP_DIR=/home/deploy/backups
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_FILE="${BACKUP_DIR}/pre_deploy_${TIMESTAMP}.dump"

            mkdir -p "$BACKUP_DIR"

            echo "=== [1/5] Carregando variáveis de ambiente ==="
            set -a
            source "${APP_DIR}/.env"
            set +a

            echo "=== [2/5] Backup do banco antes do deploy ==="
            # pg_dump roda dentro do container postgres (o client não está
            # instalado na VPS). A tag deve casar com a major do Postgres
            # gerenciado. PGSSLMODE=require: obrigatório no DO Managed PG (porta 25060).
            docker run --rm \
              -e PGPASSWORD="$DB_PASSWORD" \
              -e PGSSLMODE="${DB_SSL_MODE:-require}" \
              -v "$BACKUP_DIR:$BACKUP_DIR" \
              postgres:16-alpine \
              pg_dump \
                --host="$DB_HOST" \
                --port="${DB_PORT:-5432}" \
                --username="$DB_USER" \
                --dbname="$DB_NAME" \
                --format=custom \
                --no-password \
                --file="$BACKUP_FILE"
            echo "Backup salvo em: $BACKUP_FILE"

            echo "=== [3/5] Atualizando código ==="
            cd "$APP_DIR"
            git checkout main
            git pull origin main

            echo "=== [4/5] Aplicando migrations com detecção de falha ==="
            # Bug fix: build a imagem ANTES de rodar migrate para garantir que
            # o código novo (models, imports) esteja disponível dentro do container.
            # O container antigo continua rodando em paralelo até o `up -d` do passo 5.
            docker compose -f docker-compose.prod.yml build backend

            docker compose -f docker-compose.prod.yml run --rm \
              -e DB_HOST="$DB_HOST" \
              -e DB_PORT="$DB_PORT" \
              -e DB_NAME="$DB_NAME" \
              -e DB_USER="$DB_USER" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              -e DB_SSL_MODE="${DB_SSL_MODE:-require}" \
              -e SECRET_KEY="$SECRET_KEY" \
              -e DEBUG="0" \
              -e ALLOWED_HOSTS="$ALLOWED_HOSTS" \
              backend python manage.py migrate --noinput \
            || {
                echo ""
                echo "ERROR: migrate falhou. Iniciando restore do backup..."
                # SSL + --no-owner para evitar erros de permissão no DO Managed PG.
                # pg_restore também roda no container postgres.
                docker run --rm \
                  -e PGPASSWORD="$DB_PASSWORD" \
                  -e PGSSLMODE="${DB_SSL_MODE:-require}" \
                  -v "$BACKUP_DIR:$BACKUP_DIR" \
                  postgres:16-alpine \
                  pg_restore \
                    --host="$DB_HOST" \
                    --port="${DB_PORT:-5432}" \
                    --username="$DB_USER" \
                    --dbname="$DB_NAME" \
                    --no-password \
                    --clean \
                    --if-exists \
                    --no-owner \
                    --no-privileges \
                    "$BACKUP_FILE"
                echo "Restore concluído. Deploy abortado."
                exit 1
              }

            echo "=== [5/5] Subindo nova versão da aplicação ==="
            docker compose -f docker-compose.prod.yml up -d --build

            echo ""
            echo "Deploy concluído com sucesso. Backup disponível em: $BACKUP_FILE"
