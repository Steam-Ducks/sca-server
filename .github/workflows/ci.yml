name: CI - Feature Branch

on:
  pull_request:
    branches: [develop]

jobs:

  # ─── 1. Lint 
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install ruff==0.6.9 black==24.8.0
      - name: Ruff check
        run: ruff check .
      - name: Black check
        run: black --check .

  # ─── 2. Unit Tests 
  # Usa patch()/MagicMock. Sem DB_HOST → settings_test.py usa SQLite.
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1
      # SEM DB_HOST → settings_test.py cai para SQLite in-memory

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests with coverage
        run: |
          coverage run -m pytest -m "not integration" --tb=short -q \
            2>&1 | tee unit-output.txt
          exit ${PIPESTATUS[0]}
      - name: Generate coverage XML
        run: coverage xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: coverage.xml
          retention-days: 30
      - name: Step Summary
        if: always()
        run: |
          echo "## Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| PR | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Banco | SQLite in-memory |" >> $GITHUB_STEP_SUMMARY
          echo "| Mocks | patch() / MagicMock |" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -8 unit-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ─── 3. Integration Tests 
  # Com DB_HOST → settings_test.py usa PostgreSQL + mantém sca_data.
  # Nenhum mock — dados reais entram e saem do banco.
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: ci-secret-key
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-html

      # Os modelos silver/gold/audit precisam dos schemas antes das migrations
      - name: Create PostgreSQL schemas
        run: |
          PGPASSWORD=${{ env.DB_PASSWORD }} psql \
            -h ${{ env.DB_HOST }} -U ${{ env.DB_USER }} -d ${{ env.DB_NAME }} \
            -c "CREATE SCHEMA IF NOT EXISTS silver;
                CREATE SCHEMA IF NOT EXISTS gold;
                CREATE SCHEMA IF NOT EXISTS audit;"

      # Com DB_HOST setado, settings_test.py usa PostgreSQL automaticamente
      - name: Run migrations
        run: python manage.py migrate

      # --reuse-db: reutiliza o banco já preparado acima
      - name: Run integration tests
        run: |
          pytest -m integration \
            --reuse-db \
            --html=integration-report.html \
            --self-contained-html \
            --tb=short -v \
            2>&1 | tee integration-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload integration report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-report
          path: integration-report.html
          retention-days: 30

      - name: Step Summary
        if: always()
        run: |
          echo "## Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| PR | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Banco | PostgreSQL 16 real |" >> $GITHUB_STEP_SUMMARY
          echo "| Schemas | silver · gold · audit |" >> $GITHUB_STEP_SUMMARY
          echo "| Mocks | nenhum |" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -20 integration-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "> Relatório HTML: **Actions → Artifacts → integration-test-report**" >> $GITHUB_STEP_SUMMARY

  # ─── 4. Smoke Test
  # Inicia o Django com settings_test (AllowAny) e verifica todos os
  # endpoints críticos via httpx. Falha antes do merge se qualquer
  # rota retornar status inesperado.
  smoke-test:
    name: Smoke test da app
    runs-on: ubuntu-latest
    needs: [integration-tests]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: ci-secret-key
      DEBUG: "1"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_SETTINGS_MODULE: config.settings_test
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt httpx
      - name: Criar schemas PostgreSQL
        run: |
          PGPASSWORD=test_password psql \
            -h localhost -U test_user -d test_db \
            -c "CREATE SCHEMA IF NOT EXISTS silver;
                CREATE SCHEMA IF NOT EXISTS gold;
                CREATE SCHEMA IF NOT EXISTS audit;"
      - name: Rodar migrations
        run: python manage.py migrate
      - name: Iniciar servidor Django
        run: python manage.py runserver 0.0.0.0:8000 &
      - name: Aguardar app subir
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/api/health/ && echo "App pronta" && break
            echo "Aguardando... ($i/20)"
            sleep 3
          done
      - name: Rodar smoke tests
        run: python tests/smoke/smoke_test.py
        env:
          BASE_URL: http://localhost:8000
      - name: Step Summary
        if: always()
        run: |
          echo "## Smoke Test" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| PR | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Banco | PostgreSQL 16 real |" >> $GITHUB_STEP_SUMMARY
          echo "| Auth | AllowAny (settings_test) |" >> $GITHUB_STEP_SUMMARY

  # ─── 5. Load Test (k6)
  # Sobe o mesmo ambiente e executa 5 VUs por ~2 min.
  # Threshold: p95 < 2000 ms, taxa de erro < 1%.
  # Só roda se o smoke passou — carga pressupõe app funcional.
  load-test:
    name: Teste de carga (k6)
    runs-on: ubuntu-latest
    needs: [smoke-test]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: ci-secret-key
      DEBUG: "1"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_SETTINGS_MODULE: config.settings_test
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependências Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Instalar k6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6 -y
      - name: Criar schemas PostgreSQL
        run: |
          PGPASSWORD=test_password psql \
            -h localhost -U test_user -d test_db \
            -c "CREATE SCHEMA IF NOT EXISTS silver;
                CREATE SCHEMA IF NOT EXISTS gold;
                CREATE SCHEMA IF NOT EXISTS audit;"
      - name: Rodar migrations
        run: python manage.py migrate
      - name: Iniciar servidor Django
        run: python manage.py runserver 0.0.0.0:8000 &
      - name: Aguardar app subir
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/api/health/ && echo "App pronta" && break
            echo "Aguardando... ($i/20)"
            sleep 3
          done
      - name: Rodar teste de carga
        run: k6 run tests/load/load_test.js
        env:
          BASE_URL: http://localhost:8000
      - name: Upload resultado k6
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-ci-load-summary
          path: k6-ci-load-summary.json
          retention-days: 30
      - name: Step Summary
        if: always()
        run: |
          echo "## Teste de Carga (k6)" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| PR | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| VUs | 5 |" >> $GITHUB_STEP_SUMMARY
          echo "| Duração | ~2 min |" >> $GITHUB_STEP_SUMMARY
          echo "| Threshold p95 | < 2000 ms |" >> $GITHUB_STEP_SUMMARY

  # ─── 6. Auto-merge
  auto-merge:
    name: Auto-merge PR
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, load-test]
    if: success()
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
