name: CI - Feature Branch

on:
  pull_request:
    branches: [develop]

jobs:

  # ─── 1. Lint 
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install ruff==0.6.9 black==24.8.0
      - name: Ruff check
        run: ruff check .
      - name: Black check
        run: black --check .

  # ─── 2. Unit Tests 
  # Usa patch()/MagicMock. Sem DB_HOST → settings_test.py usa SQLite.
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1
      # SEM DB_HOST → settings_test.py cai para SQLite in-memory

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests with coverage
        run: |
          coverage run -m pytest -m "not integration" --tb=short -q \
            2>&1 | tee unit-output.txt
          exit ${PIPESTATUS[0]}
      - name: Generate coverage XML
        run: coverage xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: coverage.xml
          retention-days: 30
      - name: Step Summary
        if: always()
        run: |
          echo "## Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| PR | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Banco | SQLite in-memory |" >> $GITHUB_STEP_SUMMARY
          echo "| Mocks | patch() / MagicMock |" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -8 unit-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ─── 3. Integration Tests 
  # Com DB_HOST → settings_test.py usa PostgreSQL + mantém sca_data.
  # Nenhum mock — dados reais entram e saem do banco.
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: ci-secret-key
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-html

      # Os modelos silver/gold/audit precisam dos schemas antes das migrations
      - name: Create PostgreSQL schemas
        run: |
          PGPASSWORD=${{ env.DB_PASSWORD }} psql \
            -h ${{ env.DB_HOST }} -U ${{ env.DB_USER }} -d ${{ env.DB_NAME }} \
            -c "CREATE SCHEMA IF NOT EXISTS silver;
                CREATE SCHEMA IF NOT EXISTS gold;
                CREATE SCHEMA IF NOT EXISTS audit;"

      # Com DB_HOST setado, settings_test.py usa PostgreSQL automaticamente
      - name: Run migrations
        run: python manage.py migrate

      # --reuse-db: reutiliza o banco já preparado acima
      - name: Run integration tests
        run: |
          pytest -m integration \
            --reuse-db \
            --html=integration-report.html \
            --self-contained-html \
            --tb=short -v \
            2>&1 | tee integration-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload integration report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-report
          path: integration-report.html
          retention-days: 30

      - name: Step Summary
        if: always()
        run: |
          echo "## Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| PR | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Banco | PostgreSQL 16 real |" >> $GITHUB_STEP_SUMMARY
          echo "| Schemas | silver · gold · audit |" >> $GITHUB_STEP_SUMMARY
          echo "| Mocks | nenhum |" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -20 integration-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "> Relatório HTML: **Actions → Artifacts → integration-test-report**" >> $GITHUB_STEP_SUMMARY

  # ─── 4. Auto-merge 
  auto-merge:
    name: Auto-merge PR
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: success()
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
