name: CI

on:
  pull_request:
    branches: [develop]

jobs:

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ruff==0.6.9 black==24.8.0

      - name: Ruff check
        run: ruff check .

      - name: Black check
        run: black --check .

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      coverage: ${{ steps.metrics.outputs.coverage }}
      test_count: ${{ steps.metrics.outputs.test_count }}
      ci_duration: ${{ steps.metrics.outputs.ci_duration }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: ci-secret-key
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - name: Record start time
        run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests with coverage
        run: coverage run -m pytest -v --tb=short

      - name: Coverage report
        run: coverage report

      - name: Generate coverage XML
        run: coverage xml

      - name: Diff coverage
        run: |
          pip install diff-cover
          diff-cover coverage.xml \
            --compare-branch=origin/develop \

      - name: Collect metrics
        id: metrics
        if: always()
        run: |
          COVERAGE=$(coverage report | grep TOTAL | awk '{print $NF}' | tr -d '%')
          TEST_COUNT=$(python -m pytest --collect-only -q 2>/dev/null | tail -1 | awk '{print $1}')
          CI_DURATION=$(( $(date +%s) - $JOB_START ))
          echo "coverage=$COVERAGE"       >> $GITHUB_OUTPUT
          echo "test_count=$TEST_COUNT"   >> $GITHUB_OUTPUT
          echo "ci_duration=$CI_DURATION" >> $GITHUB_OUTPUT

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
  
  publish-metrics:

    name: Publish Metrics Dashboard
    runs-on: ubuntu-latest
    needs: [lint, test]

    if: always()

    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Update CI metrics
        run: |
          python3 << 'EOF'
          import json, os
          from datetime import datetime

          path = "ci_metrics.json"
          data = json.load(open(path)) if os.path.exists(path) else {"runs": []}

          data["runs"].append({
            "date": datetime.utcnow().isoformat(),
            "pr": os.environ.get("PR_NUMBER", ""),
            "coverage": float(os.environ.get("COVERAGE", 0)),
            "test_count": int(os.environ.get("TEST_COUNT", 0)),
            "lint": os.environ.get("LINT_RESULT", "unknown"),
            "ci_duration_s": int(os.environ.get("CI_DURATION", 0)),
          })

          data["runs"] = data["runs"][-50:]
          json.dump(data, open(path, "w"), indent=2)
          EOF

        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LINT_RESULT: ${{ needs.lint.result }}
          COVERAGE: ${{ needs.test.outputs.coverage }}
          TEST_COUNT: ${{ needs.test.outputs.test_count }}
          CI_DURATION: ${{ needs.test.outputs.ci_duration }}

      - name: Commit metrics
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ci_metrics.json
          git commit -m "feat(DEVOPS): update metrics for PR #${{ github.event.pull_request.number }}" || exit 0
          git push

  auto-merge:
    name: Auto-merge PR
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: success()

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Enable auto-merge
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash