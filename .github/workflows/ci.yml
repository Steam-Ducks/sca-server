name: CI - Feature Branch

on:
  pull_request:
    branches: [develop]

# Permissões necessárias para publicar no GitHub Pages via integration-report.yml
permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  # ─── 1. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install ruff==0.6.9 black==24.8.0
      - name: Ruff check
        run: ruff check .
      - name: Black check
        run: black --check .

  # ─── 2. Unit Tests ───────────────────────────────────────────────────────────
  # Usa patch()/MagicMock. Sem DB_HOST → settings_test.py usa SQLite.
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1
      # SEM DB_HOST → settings_test.py cai para SQLite in-memory
      # CACHES → DummyCache em settings_test.py (sem Redis necessário)

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-html pytest-json-report

      - name: Run unit tests with coverage and HTML report
        run: |
          mkdir -p pytest-report/unit
          coverage run -m pytest -m "not integration" \
            --html=pytest-report/unit/index.html \
            --self-contained-html \
            --json-report \
            --json-report-file=pytest-report/unit/results.json \
            --tb=short -q \
            2>&1 | tee unit-output.txt
          exit ${PIPESTATUS[0]}

      - name: Generate coverage XML
        run: coverage xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: coverage.xml
          retention-days: 30

      # Artefato parcial — integration-tests vai baixar e combinar com o seu
      - name: Upload unit HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report-unit
          path: pytest-report/unit/
          retention-days: 1

      - name: Step Summary
        if: always()
        run: |
          echo "## Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| PR | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Banco | SQLite in-memory |" >> $GITHUB_STEP_SUMMARY
          echo "| Mocks | patch() / MagicMock |" >> $GITHUB_STEP_SUMMARY
          if [ -f pytest-report/unit/results.json ]; then
            PASSED=$(python3 -c "import json; d=json.load(open('pytest-report/unit/results.json')); print(d['summary'].get('passed', 0))")
            FAILED=$(python3 -c "import json; d=json.load(open('pytest-report/unit/results.json')); print(d['summary'].get('failed', 0))")
            echo "| Resultado | ✅ $PASSED passed / ❌ $FAILED failed |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -8 unit-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ─── 3. Integration Tests ────────────────────────────────────────────────────
  # Com DB_HOST → settings_test.py usa PostgreSQL + mantém sca_data.
  # Nenhum mock — dados reais entram e saem do banco.
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: ci-secret-key
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-html pytest-json-report

      # Os modelos silver/gold/audit precisam dos schemas antes das migrations
      - name: Create PostgreSQL schemas
        run: |
          PGPASSWORD=${{ env.DB_PASSWORD }} psql \
            -h ${{ env.DB_HOST }} -U ${{ env.DB_USER }} -d ${{ env.DB_NAME }} \
            -c "CREATE SCHEMA IF NOT EXISTS silver;
                CREATE SCHEMA IF NOT EXISTS gold;
                CREATE SCHEMA IF NOT EXISTS audit;"

      # Com DB_HOST setado, settings_test.py usa PostgreSQL automaticamente
      - name: Run migrations
        run: python manage.py migrate

      # --reuse-db: reutiliza o banco já preparado acima
      - name: Run integration tests
        run: |
          mkdir -p pytest-report/integration
          pytest -m integration \
            --reuse-db \
            --html=pytest-report/integration/index.html \
            --self-contained-html \
            --json-report \
            --json-report-file=pytest-report/integration/results.json \
            --tb=short -v \
            2>&1 | tee integration-output.txt
          exit ${PIPESTATUS[0]}

      # Baixa o relatório unitário gerado no job anterior e combina na pasta final
      - name: Download unit report
        uses: actions/download-artifact@v4
        if: always()
        with:
          name: pytest-report-unit
          path: pytest-report/unit/

      # Página de entrada do GitHub Pages — lista os dois relatórios
      - name: Create Pages index
        if: always()
        run: |
          cat > pytest-report/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>SCA — Relatórios de Teste</title>
            <style>
              *{box-sizing:border-box;margin:0;padding:0}
              body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
                   background:#0d1117;color:#e6edf3;min-height:100vh;
                   display:flex;align-items:center;justify-content:center}
              .container{max-width:600px;width:100%;padding:2rem}
              h1{font-size:1.5rem;font-weight:600;margin-bottom:.25rem}
              .subtitle{color:#8b949e;font-size:.9rem;margin-bottom:2rem}
              .cards{display:grid;gap:1rem}
              .card{background:#161b22;border:1px solid #30363d;border-radius:8px;
                    padding:1.25rem 1.5rem;text-decoration:none;color:inherit;
                    transition:border-color .2s;display:flex;align-items:center;gap:1rem}
              .card:hover{border-color:#58a6ff}
              .icon{font-size:2rem;flex-shrink:0}
              .card-title{font-weight:600;font-size:1rem}
              .card-desc{color:#8b949e;font-size:.85rem;margin-top:.2rem}
              .badge{display:inline-block;font-size:.75rem;padding:.1rem .5rem;
                     border-radius:12px;font-weight:500;margin-left:auto}
              .green{background:#1f3a1f;color:#3fb950;border:1px solid #3fb950}
              .blue{background:#1a2d4a;color:#58a6ff;border:1px solid #58a6ff}
            </style>
          </head>
          <body>
            <div class="container">
              <h1>🧪 SCA — Relatórios de Teste</h1>
              <p class="subtitle">Backend · sca-server</p>
              <div class="cards">
                <a class="card" href="./unit/">
                  <span class="icon">⚡</span>
                  <div>
                    <div class="card-title">Testes Unitários</div>
                    <div class="card-desc">Views, serializers, selectors, models</div>
                  </div>
                  <span class="badge green">pytest</span>
                </a>
                <a class="card" href="./integration/">
                  <span class="icon">🔗</span>
                  <div>
                    <div class="card-title">Testes de Integração</div>
                    <div class="card-desc">API real + PostgreSQL — 109 CTIs</div>
                  </div>
                  <span class="badge blue">DB_HOST=postgres</span>
                </a>
              </div>
            </div>
          </body>
          </html>
          HTML

      # Artefato final combinado — consumido pelo integration-report.yml → GitHub Pages
      - name: Upload combined pytest report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report
          path: pytest-report/
          retention-days: 30

      - name: Step Summary
        if: always()
        run: |
          echo "## Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| PR | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Banco | PostgreSQL 16 real |" >> $GITHUB_STEP_SUMMARY
          echo "| Schemas | silver · gold · audit |" >> $GITHUB_STEP_SUMMARY
          echo "| Mocks | nenhum |" >> $GITHUB_STEP_SUMMARY
          if [ -f pytest-report/integration/results.json ]; then
            PASSED=$(python3 -c "import json; d=json.load(open('pytest-report/integration/results.json')); print(d['summary'].get('passed', 0))")
            FAILED=$(python3 -c "import json; d=json.load(open('pytest-report/integration/results.json')); print(d['summary'].get('failed', 0))")
            XFAIL=$(python3 -c "import json; d=json.load(open('pytest-report/integration/results.json')); print(d['summary'].get('xfailed', 0))")
            echo "| Resultado | ✅ $PASSED passed / ❌ $FAILED failed / ⏭ $XFAIL xfail |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -20 integration-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "> Relatório HTML: **Actions → Artifacts → pytest-report** ou **GitHub Pages**" >> $GITHUB_STEP_SUMMARY

  # ─── 4. Smoke Test ───────────────────────────────────────────────────────────
  # Inicia o Django com settings_test (AllowAny) e verifica todos os
  # endpoints críticos via httpx. Falha antes do merge se qualquer
  # rota retornar status inesperado.
  smoke-test:
    name: Smoke test da app
    runs-on: ubuntu-latest
    needs: [integration-tests]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: ci-secret-key
      DEBUG: "1"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_SETTINGS_MODULE: config.settings_test
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt httpx
      - name: Criar schemas PostgreSQL
        run: |
          PGPASSWORD=test_password psql \
            -h localhost -U test_user -d test_db \
            -c "CREATE SCHEMA IF NOT EXISTS silver;
                CREATE SCHEMA IF NOT EXISTS gold;
                CREATE SCHEMA IF NOT EXISTS audit;"
      - name: Rodar migrations
        run: python manage.py migrate
      - name: Criar usuário de teste
        run: |
          python manage.py shell -c "
          from django.contrib.auth import get_user_model
          from users.models import Perfil, UsuarioPerfil
          User = get_user_model()
          user, _ = User.objects.get_or_create(username='ci_smoke', defaults={'email': 'ci@test.com', 'is_superuser': True, 'is_staff': True})
          user.set_password('CiSmoke@2025')
          user.save()
          perfil, _ = Perfil.objects.get_or_create(nome='Super Admin', defaults={'descricao': 'CI', 'permissoes': 'super_admin'})
          UsuarioPerfil.objects.get_or_create(usuario=user, defaults={'perfil': perfil})
          "
      - name: Iniciar servidor Django
        run: python manage.py runserver 0.0.0.0:8000 &
      - name: Aguardar app subir
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/api/health/ && echo "App pronta" && break
            echo "Aguardando... ($i/20)"
            sleep 3
          done
      - name: Rodar smoke tests
        run: python tests/smoke/smoke_test.py
        env:
          BASE_URL: http://localhost:8000
          AUTH_USERNAME: ci_smoke
          AUTH_PASSWORD: CiSmoke@2025
      - name: Step Summary
        if: always()
        run: |
          echo "## Smoke Test" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| PR | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Banco | PostgreSQL 16 real |" >> $GITHUB_STEP_SUMMARY
          echo "| Auth | AllowAny (settings_test) |" >> $GITHUB_STEP_SUMMARY

  # ─── 5. Load Test (k6) ───────────────────────────────────────────────────────
  # Sobe o mesmo ambiente e executa 5 VUs por ~2 min.
  # Threshold: p95 < 2000 ms, taxa de erro < 1%.
  # Só roda se o smoke passou — carga pressupõe app funcional.
  load-test:
    name: Teste de carga (k6)
    runs-on: ubuntu-latest
    needs: [smoke-test]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: ci-secret-key
      DEBUG: "1"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_SETTINGS_MODULE: config.settings_test
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependências Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Instalar k6
        uses: grafana/setup-k6-action@v1
      - name: Criar schemas PostgreSQL
        run: |
          PGPASSWORD=test_password psql \
            -h localhost -U test_user -d test_db \
            -c "CREATE SCHEMA IF NOT EXISTS silver;
                CREATE SCHEMA IF NOT EXISTS gold;
                CREATE SCHEMA IF NOT EXISTS audit;"
      - name: Rodar migrations
        run: python manage.py migrate
      - name: Criar usuário de teste
        run: |
          python manage.py shell -c "
          from django.contrib.auth import get_user_model
          from users.models import Perfil, UsuarioPerfil
          User = get_user_model()
          user, _ = User.objects.get_or_create(username='ci_smoke', defaults={'email': 'ci@test.com', 'is_superuser': True, 'is_staff': True})
          user.set_password('CiSmoke@2025')
          user.save()
          perfil, _ = Perfil.objects.get_or_create(nome='Super Admin', defaults={'descricao': 'CI', 'permissoes': 'super_admin'})
          UsuarioPerfil.objects.get_or_create(usuario=user, defaults={'perfil': perfil})
          "
      - name: Iniciar servidor Django
        run: python manage.py runserver 0.0.0.0:8000 &
      - name: Aguardar app subir
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/api/health/ && echo "App pronta" && break
            echo "Aguardando... ($i/20)"
            sleep 3
          done
      - name: Rodar teste de carga
        run: k6 run tests/load/load_test.js
        env:
          BASE_URL: http://localhost:8000
          AUTH_USERNAME: ci_smoke
          AUTH_PASSWORD: CiSmoke@2025
      - name: Upload resultado k6
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-ci-load-summary
          path: k6-ci-load-summary.json
          retention-days: 30
      - name: Step Summary
        if: always()
        run: |
          echo "## Teste de Carga (k6)" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| PR | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| VUs | 5 |" >> $GITHUB_STEP_SUMMARY
          echo "| Duração | ~2 min |" >> $GITHUB_STEP_SUMMARY
          echo "| Threshold p95 | < 2000 ms |" >> $GITHUB_STEP_SUMMARY

  # ─── 6. Staging gate ─────────────────────────────────────────────────────────
  # Cria check run para satisfazer o required check do branch protection.
  staging-gate:
    name: Deploy staging (porta 8001)
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: success()
    permissions:
      checks: write
    steps:
      - name: Criar check run de staging gate
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Deploy staging (porta 8001)',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: 'success',
              output: {
                title: 'CI Gate',
                summary: 'Deploy real ocorre após merge em develop'
              }
            });

  # ─── 7. Auto-merge ───────────────────────────────────────────────────────────
  auto-merge:
    name: Auto Merge PR
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, load-test, staging-gate]
    if: success()
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --auto \
            --squash \
            --delete-branch
