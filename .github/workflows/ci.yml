name: CI - Feature Branch

on:
  pull_request:
    branches: [develop]

jobs:

  # ─── 1. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install ruff==0.6.9 black==24.8.0
      - name: Ruff check
        run: ruff check .
      - name: Black check
        run: black --check .

  # ─── 2. Unit Tests ───────────────────────────────────────────────────────────
  # Usa patch()/MagicMock. Sem DB_HOST → settings_test.py usa SQLite.
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1
      # SEM DB_HOST → settings_test.py cai para SQLite in-memory

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests with coverage
        run: |
          coverage run -m pytest -m "not integration" --tb=short -q \
            2>&1 | tee unit-output.txt
          exit ${PIPESTATUS[0]}
      - name: Generate coverage XML
        run: coverage xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: coverage.xml
          retention-days: 30
      - name: Step Summary
        if: always()
        run: |
          echo "## Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| PR | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Banco | SQLite in-memory |" >> $GITHUB_STEP_SUMMARY
          echo "| Mocks | patch() / MagicMock |" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -8 unit-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ─── 3. Integration Tests ────────────────────────────────────────────────────
  # Com DB_HOST → settings_test.py usa PostgreSQL + mantém sca_data.
  # Nenhum mock — dados reais entram e saem do banco.
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: ci-secret-key
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-html

      # Os modelos silver/gold/audit precisam dos schemas antes das migrations
      - name: Create PostgreSQL schemas
        run: |
          PGPASSWORD=${{ env.DB_PASSWORD }} psql \
            -h ${{ env.DB_HOST }} -U ${{ env.DB_USER }} -d ${{ env.DB_NAME }} \
            -c "CREATE SCHEMA IF NOT EXISTS silver;
                CREATE SCHEMA IF NOT EXISTS gold;
                CREATE SCHEMA IF NOT EXISTS audit;"

      # Com DB_HOST setado, settings_test.py usa PostgreSQL automaticamente
      - name: Run migrations
        run: python manage.py migrate

      # --reuse-db: reutiliza o banco já preparado acima
      - name: Run integration tests
        run: |
          pytest -m integration \
            --reuse-db \
            --html=integration-report.html \
            --self-contained-html \
            --tb=short -v \
            2>&1 | tee integration-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload integration report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-report
          path: integration-report.html
          retention-days: 30

      - name: Step Summary
        if: always()
        run: |
          echo "## Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| PR | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Banco | PostgreSQL 16 real |" >> $GITHUB_STEP_SUMMARY
          echo "| Schemas | silver · gold · audit |" >> $GITHUB_STEP_SUMMARY
          echo "| Mocks | nenhum |" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -20 integration-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "> Relatório HTML: **Actions → Artifacts → integration-test-report**" >> $GITHUB_STEP_SUMMARY

  # ─── 4. Branch & Commit Policy ──────────────────────────────────────────────
  # Precisam estar neste workflow (não em branch-commit-policy.yml) para que o
  # auto-merge consiga depender deles via `needs` — `needs` não enxerga jobs de
  # outro workflow. Sem isso o merge automático não era bloqueado.
  branch-name:
    name: Validate branch name
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name pattern
        uses: deepakputhraya/action-branch-name@master
        with:
          regex: '^(SCA|DEVOPS|FIX)-[0-9]+-[A-Za-z0-9._-]+$'
          ignore: develop,main
          min_length: 7
          max_length: 80

  commit-messages:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit message format
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          header_regex='^(feat|fix|chore|docs|refactor|test|perf|ci|build|style|revert)\((SCA|DEVOPS)-[0-9]+\): .+$'
          max_len=100
          fail=0
          for sha in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            subject=$(git log -1 --format=%s "$sha")
            parents=$(git log -1 --format=%P "$sha" | wc -w)
            if [ "$parents" -gt 1 ]; then
              echo "skip merge $sha: $subject"
              continue
            fi
            if [[ ! "$subject" =~ $header_regex ]]; then
              echo "::error::Invalid format ($sha): $subject"
              echo "  expected: <type>(SCA-NNN|DEVOPS-NNN): <description>"
              echo "  types: feat|fix|chore|docs|refactor|test|perf|ci|build|style|revert"
              fail=1
              continue
            fi
            if [ "${#subject}" -gt "$max_len" ]; then
              echo "::error::Subject too long (${#subject} > $max_len) ($sha): $subject"
              fail=1
            fi
            if [[ "$subject" == *. ]]; then
              echo "::error::Subject ends with period ($sha): $subject"
              fail=1
            fi
            echo "ok $sha: $subject"
          done
          exit $fail

  # ─── 5. Auto-merge ──────────────────────────────────────────────────────────
  auto-merge:
    name: Auto Merge PR
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, branch-name, commit-messages]
    if: success()
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Enable Auto Merge
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
