name: DB Compatibility Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  db-compatibility:
    name: Backend ↔ Database Compatibility
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sca_test
          POSTGRES_USER: sca_user
          POSTGRES_PASSWORD: sca_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: sca_test
      DB_USER: sca_user
      DB_PASSWORD: sca_password
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "True"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run compatibility check
        run: python scripts/check_db_compatibility.py

      - name: Upload compatibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-compatibility-report
          path: db_compatibility_report.json
          retention-days: 30

  db-tests:
    name: Database Tests
    runs-on: ubuntu-latest
    needs: db-compatibility

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sca_test
          POSTGRES_USER: sca_user
          POSTGRES_PASSWORD: sca_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: sca_test
      DB_USER: sca_user
      DB_PASSWORD: sca_password
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "True"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: pytest --tb=short -q