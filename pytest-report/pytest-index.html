<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCA — Relatórios de Teste</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #0d1117; color: #e6edf3; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; }
    .container { max-width: 600px; width: 100%; padding: 2rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
    .subtitle { color: #8b949e; font-size: 0.9rem; margin-bottom: 2rem; }
    .cards { display: grid; gap: 1rem; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px;
            padding: 1.25rem 1.5rem; text-decoration: none; color: inherit;
            transition: border-color .2s; display: flex; align-items: center; gap: 1rem; }
    .card:hover { border-color: #58a6ff; }
    .icon { font-size: 2rem; flex-shrink: 0; }
    .card-title { font-weight: 600; font-size: 1rem; }
    .card-desc  { color: #8b949e; font-size: 0.85rem; margin-top: 0.2rem; }
    .badge { display: inline-block; font-size: 0.75rem; padding: 0.1rem 0.5rem;
             border-radius: 12px; font-weight: 500; margin-left: auto; }
    .green { background: #1f3a1f; color: #3fb950; border: 1px solid #3fb950; }
    .blue  { background: #1a2d4a; color: #58a6ff; border: 1px solid #58a6ff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 SCA — Relatórios de Teste</h1>
    <p class="subtitle">Backend · sca-server</p>
    <div class="cards">
      <a class="card" href="./unit/">
        <span class="icon">⚡</span>
        <div>
          <div class="card-title">Testes Unitários</div>
          <div class="card-desc">Views, serializers, selectors, models</div>
        </div>
        <span class="badge green">pytest</span>
      </a>
      <a class="card" href="./integration/">
        <span class="icon">🔗</span>
        <div>
          <div class="card-title">Testes de Integração</div>
          <div class="card-desc">API real + PostgreSQL — 109 CTIs</div>
        </div>
        <span class="badge blue">DB_HOST=postgres</span>
      </a>
    </div>
  </div>
</body>
</html>
